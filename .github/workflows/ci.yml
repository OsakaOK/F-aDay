name: CI

# Runs on every PR into main and on direct pushes to main, so a broken change
# is caught before it can auto-deploy to production.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & build
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      # Also type-checks and lints (next build does both). No DATABASE_URL needed:
      # the home page is force-dynamic, so nothing hits the database at build time.
      - name: Production build
        run: npm run build
